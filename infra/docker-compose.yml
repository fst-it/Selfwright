name: selfwright

services:
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    profiles: [llm-gateway]
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?required}
      # Uncomment to enable additional providers:
      # OPENAI_API_KEY: ${OPENAI_API_KEY}
      # GEMINI_API_KEY: ${GEMINI_API_KEY}
      # MISTRAL_API_KEY: ${MISTRAL_API_KEY}
      # DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
    command:
      - "--config"
      - "/app/config.yaml"
      - "--port"
      - "4000"
      - "--telemetry"
      - "False"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  ollama:
    image: ollama/ollama:latest
    profiles: [embeddings, memory]
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      # The ollama/ollama image has no curl binary — a plain TCP-connect check stands in.
      test: ["CMD-SHELL", "timeout 2 bash -c 'echo > /dev/tcp/localhost/11434' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    # Uncomment for NVIDIA GPU passthrough (any CUDA-capable GPU).
    # Requires the NVIDIA Container Toolkit; omit this block to run Ollama on CPU only.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Init script creates the separate 'metabase' database on first volume init only.
      # Existing volume? Run manually: docker exec -it selfwright-postgres-1 createdb -U selfwright metabase
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    environment:
      POSTGRES_DB: selfwright
      POSTGRES_USER: selfwright
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required — copy .env.example to .env first}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U selfwright -d selfwright"]
      interval: 10s
      timeout: 5s
      retries: 3

  mem0:
    build:
      context: ./mem0-service
    profiles: [memory]
    ports:
      - "127.0.0.1:8050:8050"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: selfwright
      POSTGRES_USER: selfwright
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required — copy .env.example to .env first}
      MEM0_SERVICE_TOKEN: ${MEM0_SERVICE_TOKEN:-}
      # Set MEM0_ALLOW_NO_AUTH=1 in .env to run without a token (loopback-only; see main.py).
      MEM0_ALLOW_NO_AUTH: ${MEM0_ALLOW_NO_AUTH:-}
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8050/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # AGPL BOUNDARY — T3.4 / D18 evaluation service (run-both-keep-one; not committed to)
  #
  # Metabase is licensed under the AGPL v3. Anchor §8 requires arm's-length treatment:
  # this service is reached ONLY by a human browser at http://localhost:3000. It is
  # NEVER imported, linked, or called programmatically by any code in packages/ or apps/.
  # No Selfwright SDK, API client, or pnpm workspace package may reference this service.
  #
  # Metabase's own application state lives in the SEPARATE 'metabase' database (not the
  # 'selfwright' database). Selfwright read access is granted via a manual read-only
  # Metabase connection in the GUI (localhost:5432 / selfwright db / selfwright user).
  #
  # If the D18 evaluation selects Evidence.dev, remove this service and the
  # postgres-init/ mount from the postgres service (drop the metabase DB first:
  #   docker exec -it selfwright-postgres-1 dropdb -U selfwright metabase
  # then remove the postgres_data volume or it will linger harmlessly).
  # ---------------------------------------------------------------------------
  metabase:
    image: metabase/metabase:latest
    profiles: [reporting-metabase]
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_HOST: postgres
      MB_DB_PORT: "5432"
      MB_DB_DBNAME: metabase
      MB_DB_USER: selfwright
      MB_DB_PASS: ${POSTGRES_PASSWORD:?required — copy .env.example to .env first}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ---------------------------------------------------------------------------
  # Evidence.dev — MIT-licensed, code-first dashboards (D18 evaluation, port 3001)
  # Runs on Node 22 in-container; host Node version is irrelevant.
  # ---------------------------------------------------------------------------
  evidence:
    image: node:22-bookworm-slim
    profiles: [reporting-evidence]
    working_dir: /app
    volumes:
      - ./evidence:/app
      - evidence_node_modules:/app/node_modules
    command: >
      sh -c "npm install && npm run sources && npm run build && npx -y serve build -l 3001"
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      EVIDENCE_DISABLE_INCLUDE: "true"
      EVIDENCE_SOURCE__selfwright_db__host: postgres
      EVIDENCE_SOURCE__selfwright_db__port: "5432"
      EVIDENCE_SOURCE__selfwright_db__database: selfwright
      EVIDENCE_SOURCE__selfwright_db__user: selfwright
      EVIDENCE_SOURCE__selfwright_db__password: ${POSTGRES_PASSWORD:?required — copy .env.example to .env first}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ollama_data:
  postgres_data:
  evidence_node_modules:
